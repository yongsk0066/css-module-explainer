name: TS7 Phase A Shadow

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ts7-phase-a-shadow-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shadow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@10.30.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: ./scripts/release.sh
      - run: pnpm build
      - id: ts7_phase_a_readiness
        name: Run ts7-phase-a readiness
        run: pnpm check:ts7-phase-a-readiness
        continue-on-error: true
      - id: ts7_phase_a_shadow
        name: Run ts7-phase-a shadow
        run: pnpm check:ts7-phase-a-shadow
        continue-on-error: true
      - id: ts7_phase_a_stability
        name: Run ts7-phase-a stability
        run: pnpm check:ts7-phase-a-stability
        continue-on-error: true
      - if: always()
        name: Enforce ts7-phase-a shadow result
        run: |
          echo "ts7_phase_a_readiness=${{ steps.ts7_phase_a_readiness.outcome }}"
          echo "ts7_phase_a_shadow=${{ steps.ts7_phase_a_shadow.outcome }}"
          echo "ts7_phase_a_stability=${{ steps.ts7_phase_a_stability.outcome }}"
          failed=0
          if [ "${{ steps.ts7_phase_a_readiness.outcome }}" != "success" ]; then
            failed=1
          fi
          if [ "${{ steps.ts7_phase_a_shadow.outcome }}" != "success" ]; then
            failed=1
          fi
          if [ "${{ steps.ts7_phase_a_stability.outcome }}" != "success" ]; then
            failed=1
          fi
          exit "$failed"
