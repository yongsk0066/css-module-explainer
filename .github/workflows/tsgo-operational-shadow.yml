name: TSGO Operational Shadow

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: tsgo-operational-shadow-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shadow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@10.30.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: ./scripts/release.sh
      - run: pnpm cme-check run build
      - id: release_batch_tsgo
        name: Run release-batch-tsgo
        run: pnpm cme-check run tsgo/release-batch
        continue-on-error: true
      - id: real_project_corpus_tsgo
        name: Run real-project-corpus-tsgo
        run: pnpm cme-check run tsgo/real-project-corpus
        continue-on-error: true
      - id: lsp_server_smoke_tsgo
        name: Run lsp-server-smoke-tsgo
        run: pnpm cme-check run tsgo/lsp-server-smoke
        continue-on-error: true
      - id: tsgo_operational_lane
        name: Run tsgo-operational-lane
        run: pnpm cme-check bundle tsgo/operational/lane
        continue-on-error: true
      - if: always()
        name: Enforce tsgo operational shadow result
        run: |
          echo "release_batch_tsgo=${{ steps.release_batch_tsgo.outcome }}"
          echo "real_project_corpus_tsgo=${{ steps.real_project_corpus_tsgo.outcome }}"
          echo "lsp_server_smoke_tsgo=${{ steps.lsp_server_smoke_tsgo.outcome }}"
          echo "tsgo_operational_lane=${{ steps.tsgo_operational_lane.outcome }}"
          failed=0
          if [ "${{ steps.release_batch_tsgo.outcome }}" != "success" ]; then
            failed=1
          fi
          if [ "${{ steps.real_project_corpus_tsgo.outcome }}" != "success" ]; then
            failed=1
          fi
          if [ "${{ steps.lsp_server_smoke_tsgo.outcome }}" != "success" ]; then
            failed=1
          fi
          if [ "${{ steps.tsgo_operational_lane.outcome }}" != "success" ]; then
            failed=1
          fi
          exit "$failed"
