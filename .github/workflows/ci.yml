name: CI

on:
  pull_request:
    branches: [master, next]
  push:
    branches: [master, next, feat/ir-stack-base]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@10.30.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: ./scripts/release.sh
      - run: pnpm cme-check run core/check
      - run: pnpm cme-check doctor
      - run: pnpm cme-check run tooling/orchestrator-inventory
      - run: pnpm cme-check run test/test
      - run: pnpm cme-check run core/build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: dist/
          retention-days: 1
          if-no-files-found: error

  protocol-matrix:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@10.30.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: ./scripts/release.sh
      - run: pnpm cme-check run test/protocol

  runner-matrix:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@10.30.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: cargo build --manifest-path rust/Cargo.toml -p engine-shadow-runner --release
      - run: cargo build --manifest-path rust/Cargo.toml -p omena-lsp-server --release
      - run: node ./scripts/prepare-engine-shadow-runner.mjs
      - run: node ./scripts/prepare-omena-lsp-server.mjs
      - run: node ./scripts/prepare-tsgo-binary.mjs
      - id: target
        shell: bash
        run: |
          TARGET_DIR="$(node -p "process.platform + '-' + process.arch")"
          echo "dir=${TARGET_DIR}" >> "$GITHUB_OUTPUT"
          tar -czf "engine-shadow-runner-${TARGET_DIR}.tgz" -C dist/bin "$TARGET_DIR"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: engine-shadow-runner-${{ steps.target.outputs.dir }}
          path: engine-shadow-runner-${{ steps.target.outputs.dir }}.tgz
          retention-days: 1
          if-no-files-found: error

  extension-host-smoke:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@10.30.3 --activate
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: dist/
      - run: xvfb-run -a pnpm cme-check run test/extension-host

  package:
    runs-on: ubuntu-latest
    needs: [verify, runner-matrix]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@10.30.3 --activate
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: engine-shadow-runner-*
          path: .runner-artifacts
      - run: node ./scripts/merge-engine-shadow-runner-artifacts.mjs
      - run: pnpm cme-check run release/check/packaged-engine-shadow-runner-matrix
        env:
          CME_PACKAGED_RUNNER_MIN_TARGETS: "3"
          CME_PACKAGED_RUNNER_REQUIRED_PLATFORMS: linux,darwin,win32
      - run: pnpm cme-check run release/check/packaged-tsgo-binary
        env:
          CME_PACKAGED_TSGO_MIN_TARGETS: "3"
          CME_PACKAGED_TSGO_REQUIRED_PLATFORMS: linux,darwin,win32
      - run: pnpm exec vsce package --no-dependencies
      - run: pnpm cme-check run release/check/packaged-selected-query-default
        env:
          CME_PACKAGED_RUNNER_MIN_TARGETS: "3"
          CME_PACKAGED_RUNNER_REQUIRED_PLATFORMS: linux,darwin,win32
          CME_PACKAGED_TSGO_MIN_TARGETS: "3"
          CME_PACKAGED_TSGO_REQUIRED_PLATFORMS: linux,darwin,win32
          CME_PACKAGED_OMENA_LSP_SERVER_MIN_TARGETS: "3"
          CME_PACKAGED_OMENA_LSP_SERVER_REQUIRED_PLATFORMS: linux,darwin,win32
      - name: VSIX size gate (max 128 MB)
        run: |
          SIZE=$(wc -c < *.vsix | tr -d ' ')
          echo "VSIX size: $SIZE bytes"
          if [ "$SIZE" -gt 134217728 ]; then
            echo "::error::VSIX exceeds 128 MB budget ($SIZE bytes)"
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error
