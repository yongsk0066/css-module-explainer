name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build

  package:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec vsce package --no-dependencies
      - name: VSIX size gate (max 5 MB)
        run: |
          SIZE=$(wc -c < *.vsix | tr -d ' ')
          echo "VSIX size: $SIZE bytes"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "::error::VSIX exceeds 5 MB budget ($SIZE bytes)"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
