name: Checker Release Gate Shadow

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: checker-release-gate-shadow-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shadow-soak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@10.30.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: ./scripts/release.sh
      - run: pnpm build
      - run: pnpm exec tsc -b server/engine-core-ts
      - run: pnpm exec tsc -b server/engine-host-node
      - id: rust_workspace
        name: Run rust-workspace
        run: pnpm check:rust-workspace
        continue-on-error: true
      - id: rust_producer_boundary
        name: Run rust-producer-boundary
        run: pnpm check:rust-producer-boundary
        continue-on-error: true
      - id: rust_parser_public_product
        name: Run rust-parser-public-product
        run: pnpm check:rust-parser-public-product
        continue-on-error: true
      - id: rust_gate_evidence
        name: Run rust-gate-evidence
        run: pnpm check:rust-gate-evidence -- --variant typescript-current --repeat 1 --json
        continue-on-error: true
      - id: checker_entrance
        name: Run checker entrance gate
        run: pnpm check:rust-checker-entrance
        continue-on-error: true
      - id: checker_promotion_evidence
        name: Run checker promotion evidence
        run: pnpm check:rust-checker-promotion-evidence
        continue-on-error: true
      - if: always()
        name: Enforce shadow soak result
        run: |
          echo "rust_workspace=${{ steps.rust_workspace.outcome }}"
          echo "rust_producer_boundary=${{ steps.rust_producer_boundary.outcome }}"
          echo "rust_parser_public_product=${{ steps.rust_parser_public_product.outcome }}"
          echo "rust_gate_evidence=${{ steps.rust_gate_evidence.outcome }}"
          echo "checker_entrance=${{ steps.checker_entrance.outcome }}"
          echo "checker_promotion_evidence=${{ steps.checker_promotion_evidence.outcome }}"
          failed=0
          if [ "${{ steps.rust_workspace.outcome }}" != "success" ]; then
            failed=1
          fi
          if [ "${{ steps.rust_producer_boundary.outcome }}" != "success" ]; then
            failed=1
          fi
          if [ "${{ steps.rust_parser_public_product.outcome }}" != "success" ]; then
            failed=1
          fi
          if [ "${{ steps.rust_gate_evidence.outcome }}" != "success" ]; then
            failed=1
          fi
          if [ "${{ steps.checker_entrance.outcome }}" != "success" ]; then
            failed=1
          fi
          if [ "${{ steps.checker_promotion_evidence.outcome }}" != "success" ]; then
            failed=1
          fi
          exit "$failed"
