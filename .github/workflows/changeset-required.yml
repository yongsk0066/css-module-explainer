name: Changeset Required

on:
  pull_request:
    branches: [master, next]

concurrency:
  group: changeset-required-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Require a changeset for release-impacting pull requests
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_PATH: ${{ github.event_path }}
        run: |
          set -euo pipefail

          head_ref="$(jq -r '.pull_request.head.ref' "$EVENT_PATH")"
          title="$(jq -r '.pull_request.title' "$EVENT_PATH")"
          labels="$(jq -r '.pull_request.labels[].name?' "$EVENT_PATH")"

          if printf '%s\n' "$labels" | grep -qxE 'changeset:skip|release:skip'; then
            echo "Skip label present; changeset not required."
            exit 0
          fi

          if [[ "$head_ref" == changeset-release/* ]] || [[ "$title" == "chore(release): version packages" ]]; then
            echo "Release PR detected; changeset not required."
            exit 0
          fi

          git fetch --no-tags origin "$BASE_REF:$BASE_REF"
          changed_files="$(git diff --name-only "$BASE_REF...HEAD")"

          if [[ -z "$changed_files" ]]; then
            echo "No changed files detected."
            exit 0
          fi

          requires_changeset=false
          while IFS= read -r file; do
            case "$file" in
              .changeset/*.md)
                ;;
              .github/*|.personal_docs/*|docs/*|examples/*|test/*)
                ;;
              *.md|*.txt|*.png|*.jpg|*.jpeg|*.gif|*.svg|*.yml|*.yaml)
                ;;
              *)
                requires_changeset=true
                break
                ;;
            esac
          done <<< "$changed_files"

          if [[ "$requires_changeset" != true ]]; then
            echo "Docs/test/CI-only PR; changeset not required."
            exit 0
          fi

          if printf '%s\n' "$changed_files" | grep -Eq '^\.changeset/[^/]+\.md$'; then
            echo "Changeset found."
            exit 0
          fi

          echo "::error::This pull request changes release-impacting files but does not include a .changeset/*.md entry."
          echo "Add a changeset or apply the 'changeset:skip' label for non-release-impacting work."
          exit 1
