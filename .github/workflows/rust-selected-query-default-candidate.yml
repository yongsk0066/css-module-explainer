name: Rust Selected Query Default Candidate

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: rust-selected-query-default-candidate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shadow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@10.30.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: ./scripts/release.sh
      - id: rust_selected_query_default_candidate
        name: Run rust-selected-query default-candidate
        run: pnpm check:rust-selected-query-default-candidate
        continue-on-error: true
      - if: always()
        name: Enforce rust-selected-query default-candidate result
        run: |
          echo "rust_selected_query_default_candidate=${{ steps.rust_selected_query_default_candidate.outcome }}"
          failed=0
          if [ "${{ steps.rust_selected_query_default_candidate.outcome }}" != "success" ]; then
            failed=1
          fi
          exit "$failed"
